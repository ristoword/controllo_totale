<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title data-i18n="cantina_title">CONTROLLO TOTALE – Cantina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/shared/rw-shell.css" />
  <link rel="stylesheet" href="cantina.css" />
</head>
<body>
  <div class="layout rw-layout">

    <aside class="sidebar" id="sidebar"></aside>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <div class="main-col">
      <header class="app-header">
        <div>
          <p class="greeting-title" id="rw-greeting">Ciao</p>
          <p class="greeting-date" id="rw-date">—</p>
        </div>
        <div class="global-search">
          <span class="global-search-icon" aria-hidden="true">🔍</span>
          <input type="search" id="global-search" data-i18n-placeholder="rw_search_placeholder" placeholder="Cerca ovunque: tavolo, cliente, piatto..." />
        </div>
        <div class="header-actions">
          <div id="lang-selector"></div>
          <button class="header-bell" type="button" aria-label="Notifiche">🔔</button>
          <div class="user-avatar" id="rw-avatar" title="Account">?</div>
        </div>
      </header>

      <main class="main">
        <header class="cantina-hero">
          <div class="cantina-hero-text">
            <h1 data-i18n="cantina">Cantina</h1>
            <p data-i18n="cantina_hero_sub">Gestisci la carta dei vini: annate, prezzi, abbinamenti e giacenze.</p>
          </div>
          <div class="cantina-hero-badges">
            <span class="stat-badge stat-total"><span data-i18n="cantina_badge_labels">ETICHETTE</span> <strong id="badge-total">0</strong></span>
            <span class="stat-badge stat-red"><span data-i18n="wine_color_rosso">ROSSI</span> <strong id="badge-red">0</strong></span>
            <span class="stat-badge stat-white"><span data-i18n="wine_color_bianco">BIANCHI</span> <strong id="badge-white">0</strong></span>
          </div>
          <div class="cantina-hero-actions">
            <button class="btn ghost" id="btn-toggle-buy" type="button" data-i18n="cantina_show_buy">👁 Prezzi acquisto</button>
            <button class="btn outline-ai" id="btn-ai" type="button" data-i18n="cantina_ai_btn">✨ AI Cantina</button>
            <button class="btn primary" id="btn-new" type="button" data-i18n="cantina_add_wine">+ Aggiungi vino</button>
          </div>
        </header>

        <div class="filter-bar">
          <div class="filter-search">
            <span aria-hidden="true">🔍</span>
            <input type="text" id="f-search" data-i18n-placeholder="cantina_search_full" placeholder="Cerca vino, cantina, vitigno..." />
          </div>
          <select id="f-color">
            <option value="" data-i18n="cantina_all_colors">Tutti i colori</option>
            <option value="rosso" data-i18n="wine_color_rosso">Rosso</option>
            <option value="bianco" data-i18n="wine_color_bianco">Bianco</option>
            <option value="rose" data-i18n="wine_color_rose">Rosé</option>
            <option value="bollicine" data-i18n="wine_color_bollicine">Bollicine</option>
            <option value="passito" data-i18n="wine_color_passito">Passito</option>
            <option value="orange" data-i18n="wine_color_orange">Orange</option>
          </select>
          <button class="btn ghost" id="btn-refresh" type="button" data-i18n="refresh">Aggiorna</button>
        </div>

        <p id="cantina-load-error" class="cantina-error" style="display:none" role="alert"></p>

        <div class="wine-grid" id="wine-grid"></div>

        <article class="ai-panel" id="ai-panel" style="display:none">
          <header class="ai-panel-head">
            <h2 data-i18n="cantina_ai_insight">AI Cantina – Insight</h2>
            <button class="btn ghost" id="btn-ai-close" type="button" data-i18n="close">Chiudi</button>
          </header>
          <pre id="ai-output" class="ai-output"></pre>
        </article>
      </main>
    </div>
  </div>

  <div class="modal-backdrop" id="wine-modal" hidden>
    <div class="modal" role="dialog" aria-labelledby="form-title">
      <header class="modal-head">
        <h2 id="form-title" data-i18n="cantina_form_new">Nuovo vino</h2>
        <button class="modal-close" id="btn-modal-close" type="button" aria-label="Chiudi">×</button>
      </header>
      <form id="wine-form" class="form-grid">
        <input type="hidden" id="wine-id" />
        <label><span data-i18n="cantina_producer">Produttore</span><input id="wine-producer" required /></label>
        <label><span data-i18n="cantina_wine_name">Nome vino</span><input id="wine-name" required /></label>
        <label><span data-i18n="cantina_vintage">Annata produzione</span><input type="number" id="wine-vintage" /></label>
        <label><span data-i18n="cantina_color">Colore</span>
          <select id="wine-color">
            <option value="rosso" data-i18n="wine_color_rosso">Rosso</option>
            <option value="bianco" data-i18n="wine_color_bianco">Bianco</option>
            <option value="rose" data-i18n="wine_color_rose">Rosé</option>
            <option value="bollicine" data-i18n="wine_color_bollicine">Bollicine</option>
            <option value="passito" data-i18n="wine_color_passito">Passito</option>
            <option value="orange" data-i18n="wine_color_orange">Orange</option>
          </select>
        </label>
        <label><span data-i18n="cantina_region">Regione</span><input id="wine-region" /></label>
        <label><span data-i18n="cantina_country">Paese</span><input id="wine-country" /></label>
        <label><span data-i18n="cantina_grape">Vitigno</span><input id="wine-grape" /></label>
        <label><span data-i18n="cantina_alcohol">Gradi alcolici</span><input type="number" step="0.1" id="wine-alcohol" /></label>
        <label><span data-i18n="cantina_buy_price">Prezzo acquisto €</span><input type="number" step="0.01" id="wine-buy" /></label>
        <label><span data-i18n="cantina_sale_price">Prezzo vendita €</span><input type="number" step="0.01" id="wine-sale" /></label>
        <label><span data-i18n="cantina_stock_bottles">Stock bottiglie</span><input type="number" id="wine-stock" min="0" value="0" /></label>
        <label class="full"><span data-i18n="cantina_pairings">Abbinamenti</span><textarea id="wine-pairings" rows="2"></textarea></label>
        <label class="full"><span data-i18n="cantina_notes">Note</span><textarea id="wine-notes" rows="2"></textarea></label>
        <div class="form-actions full">
          <button class="btn ghost" type="button" id="btn-cancel" data-i18n="cancel">Annulla</button>
          <button class="btn primary" type="submit" data-i18n="save">Salva</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/shared/sidebar-mobile.js"></script>
  <script src="/shared/rw-shell.js"></script>
  <script src="/shared/auth-guard.js" data-allowed-roles="owner,supervisor,sala,bar,cassa,magazzino,pizzeria,cucina"></script>
  <script src="/shared/sidebar-nav.js"></script>
  <script src="cantina.js?v=20260622c"></script>
</body>
</html>
