<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title data-i18n="login_title">CONTROLLO TOTALE – Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="brand-block">
        <div class="brand-logo">RW</div>
        <div>
          <h1>CONTROLLO TOTALE</h1>
          <p class="subtitle" data-i18n="login_subtitle">Accesso sistema</p>
        </div>
      </div>

      <form id="login-form" class="login-form" autocomplete="off">
        <div class="field">
          <label for="username" data-i18n="login_user">Utente</label>
          <input
            type="text"
            id="username"
            name="username"
            data-i18n-placeholder="login_user_placeholder"
            placeholder="Es. risto_owner"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            required
          />
        </div>

        <div class="field">
          <label for="password" data-i18n="login_password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            data-i18n-placeholder="login_password_placeholder"
            placeholder="Inserisci password"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="field">
          <label for="role" data-i18n="login_role">Ruolo</label>
          <select id="role" name="role">
            <option value="owner">Owner</option>
            <option value="supervisor">Supervisor</option>
            <option value="sala">Sala</option>
            <option value="cucina">Cucina</option>
            <option value="cassa">Cassa</option>
            <option value="bar">Bar</option>
            <option value="pizzeria">Pizzeria</option>
            <option value="magazzino">Magazzino</option>
            <option value="staff">Staff</option>
            <option value="cashier">Cassa (demo)</option>
            <option value="kitchen">Cucina (demo)</option>
            <option value="customer">Cliente</option>
          </select>
        </div>

        <button type="submit" class="btn-login" id="btn-login" data-i18n="login_enter">
          Entra
        </button>

        <div id="login-message" class="login-message"></div>
      </form>
      <p style="text-align:center;margin-top:14px;font-size:13px;opacity:0.85">
        <a href="/dashboard/dashboard.html" style="color:inherit" data-i18n="dashboard_back">← Dashboard</a>
      </p>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="login.js"></script>
</body>
</html>
