<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Controllo Totale — Sala (schermo intero)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="sala-fullscreen.css" />
</head>
<body class="ct-sala-fs">
  <header class="ct-fs-topbar">
    <div class="ct-fs-brand">
      <span class="ct-fs-logo">CT</span>
      <span>Controllo Totale — Sala</span>
    </div>
    <nav class="ct-fs-nav" aria-label="Collegamenti rapidi">
      <a href="/dashboard/dashboard.html">Dashboard</a>
      <a href="/staff-hr/index.html">Staff HR</a>
      <a href="/cucina/cucina.html">Cucina</a>
      <a href="/cassa/cassa.html">Cassa</a>
      <a href="/sala/sala.html" title="Vista classica due colonne">Sala classica</a>
    </nav>
    <div class="ct-fs-status-badges" id="ct-fs-status-badges">
      <span class="ct-fs-badge badge-libero">Libero <strong id="cnt-libero">0</strong></span>
      <span class="ct-fs-badge badge-aperto">Occupato <strong id="cnt-aperto">0</strong></span>
      <span class="ct-fs-badge badge-conto">Conto <strong id="cnt-conto">0</strong></span>
      <span class="ct-fs-badge badge-sporco">Pulizia <strong id="cnt-sporco">0</strong></span>
    </div>
    <div class="ct-fs-right">
      <div id="ct-fs-clock" class="ct-fs-clock" aria-live="polite">—:—:—</div>
    </div>
  </header>
  <div class="ct-fs-frame-wrap">
    <iframe
      class="ct-fs-frame"
      title="Sala — mappa e ordini"
      src="sala.html"
      importance="high"
    ></iframe>
  </div>
  <script>
    (function clock() {
      const el = document.getElementById("ct-fs-clock");
      function tick() {
        const d = new Date();
        el.textContent = d.toLocaleTimeString("it-IT", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }
      tick();
      setInterval(tick, 1000);
    })();

    (function statusCounters() {
      async function refresh() {
        try {
          const res = await fetch("/api/sala/tables", { credentials: "same-origin" });
          if (!res.ok) return;
          const tables = await res.json();
          const counts = { libero: 0, aperto: 0, conto: 0, sporco: 0 };
          (Array.isArray(tables) ? tables : []).forEach(t => {
            if (counts[t.stato] !== undefined) counts[t.stato]++;
          });
          document.getElementById("cnt-libero").textContent = counts.libero;
          document.getElementById("cnt-aperto").textContent = counts.aperto;
          document.getElementById("cnt-conto").textContent = counts.conto;
          document.getElementById("cnt-sporco").textContent = counts.sporco;
        } catch (_) {}
      }
      refresh();
      setInterval(refresh, 10000);
    })();
  </script>
  <script src="/js/i18n.js"></script>
</body>
</html>
