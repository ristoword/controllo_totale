<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Controllo Totale — Il mio profilo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="staff-me.css" />
</head>
<body>
  <div class="layout-me">

    <!-- PROFILE HEADER -->
    <div class="profile-header">
      <div class="avatar" id="avatar">—</div>
      <div class="profile-info">
        <h1 class="profile-name" id="profile-name">Caricamento…</h1>
        <span class="profile-role" id="profile-role">—</span>
      </div>
      <div class="profile-actions">
        <a class="btn ghost" href="/dashboard/dashboard.html">Dashboard</a>
        <a class="btn ghost" href="/change-password/change-password.html">Cambio password</a>
      </div>
    </div>

    <!-- INFO CARDS -->
    <div class="info-cards">
      <div class="info-card">
        <div class="info-card-label">Email</div>
        <div class="info-card-value" id="info-email">—</div>
      </div>
      <div class="info-card">
        <div class="info-card-label">Data assunzione</div>
        <div class="info-card-value" id="info-hire">—</div>
      </div>
      <div class="info-card">
        <div class="info-card-label">Ore/settimana</div>
        <div class="info-card-value" id="info-hours">—</div>
      </div>
    </div>

    <!-- CLOCK IN/OUT -->
    <article class="card">
      <header class="card-header">
        <h2>Timbratura</h2>
      </header>
      <div class="card-body">
        <div class="clock-section">
          <div class="clock-status-box">
            <div class="clock-status-label">Stato turno corrente</div>
            <div class="clock-status-value" id="clock-status-text">Caricamento…</div>
          </div>
          <div class="clock-actions">
            <button class="btn primary" id="btn-clock-in" disabled>Timbra entrata</button>
            <button class="btn" id="btn-clock-out" disabled style="border-color:var(--ok);color:var(--ok);">Timbra uscita</button>
          </div>
          <div id="msg-clock" class="msg-bar"></div>
        </div>
      </div>
    </article>

    <!-- MONTHLY HOURS -->
    <div class="hours-total-box">
      <span class="hours-total-label">Ore totali mese corrente</span>
      <span class="hours-total-value" id="month-hours-total">—</span>
    </div>

    <!-- ATTENDANCE TABLE -->
    <article class="card">
      <header class="card-header">
        <h2>Le mie presenze</h2>
      </header>
      <div class="card-body">
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Data</th>
                <th>Entrata</th>
                <th>Uscita</th>
                <th>Ore</th>
              </tr>
            </thead>
            <tbody id="tbody-attendance">
              <tr><td colspan="4" class="empty-cell">Caricamento…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </article>

  </div>

  <script src="/shared/auth-guard.js" data-allowed-roles="owner,supervisor,sala,cucina,cassa,staff,bar,magazzino,pizzeria,cashier,kitchen"></script>
  <script src="staff-me.js"></script>
</body>
</html>
