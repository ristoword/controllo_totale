<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title data-i18n="customers.title">CRM Clienti</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/shared/rw-shell.css" />
  <link rel="stylesheet" href="customers.css" />
</head>
<body>
  <div class="layout rw-layout">

    <aside class="sidebar" id="sidebar"></aside>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <div class="main-col">
      <header class="app-header">
        <div>
          <p class="greeting-title" id="rw-greeting">Ciao</p>
          <p class="greeting-date" id="rw-date">—</p>
        </div>
        <div class="global-search">
          <span class="global-search-icon" aria-hidden="true">🔍</span>
          <input type="search" id="global-search" data-i18n-placeholder="rw_search_placeholder" placeholder="Cerca ovunque..." />
        </div>
        <div class="header-actions">
          <div id="lang-selector"></div>
          <button class="header-bell" type="button" aria-label="Notifiche">🔔</button>
          <div class="user-avatar" id="rw-avatar" title="Account">?</div>
        </div>
      </header>

      <main class="main">
        <header class="crm-hero">
          <div>
            <h1 class="crm-title" data-i18n="customers.title">CRM Clienti</h1>
            <p class="crm-sub" data-i18n="customers.subtitle">Gestione anagrafica, preferenze, allergie e storico visite</p>
          </div>
          <div class="crm-hero-actions">
            <button class="btn outline-ai" id="btn-ai" type="button" data-i18n="customers.ai_insights">✨ AI Insights</button>
            <button class="btn primary" id="btn-add-customer" type="button" data-i18n="customers.newCustomer">+ Nuovo cliente</button>
          </div>
        </header>

        <div class="crm-search-row">
          <div class="crm-search">
            <span aria-hidden="true">🔍</span>
            <input type="text" id="f-search" data-i18n-placeholder="customers.searchPlaceholder" placeholder="Cerca cliente..." />
          </div>
          <div class="filter-pills" id="filter-pills">
            <button class="pill active" type="button" data-cat="" data-i18n="customers.filterAll">Tutti</button>
            <button class="pill" type="button" data-cat="vip">VIP</button>
            <button class="pill" type="button" data-cat="habitue" data-i18n="customers.type_habitue">Habitué</button>
            <button class="pill" type="button" data-cat="walkin" data-i18n="customers.type_walkin">Walk-in</button>
            <button class="pill" type="button" data-cat="nuovo" data-i18n="customers.type_nuovo">Nuovo</button>
          </div>
        </div>

        <section class="kpi-row">
          <article class="kpi-card">
            <div class="kpi-label" data-i18n="customers.totalCustomers">Clienti totali</div>
            <div class="kpi-value" id="k-total">0</div>
          </article>
          <article class="kpi-card">
            <div class="kpi-label">VIP</div>
            <div class="kpi-value kpi-vip" id="k-vip">0</div>
          </article>
          <article class="kpi-card">
            <div class="kpi-label" data-i18n="customers.avgSpend">Spesa media</div>
            <div class="kpi-value kpi-ok" id="k-avg">€ 0</div>
          </article>
          <article class="kpi-card">
            <div class="kpi-label" data-i18n="customers.newThisMonth">Nuovi questo mese</div>
            <div class="kpi-value kpi-new" id="k-new">0</div>
          </article>
        </section>

        <section class="table-card">
          <div class="table-wrap">
            <table class="crm-table">
              <thead>
                <tr>
                  <th data-i18n="customers.fullname">Nome</th>
                  <th data-i18n="customers.type">Tipo</th>
                  <th data-i18n="customers.visits">Visite</th>
                  <th data-i18n="customers.totalSpent">Spesa totale</th>
                  <th data-i18n="customers.lastVisit">Ultima visita</th>
                  <th data-i18n="customers.allergies">Allergie</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="customer-tbody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- Modal cliente -->
  <div class="modal-backdrop" id="modal-customer" hidden>
    <div class="modal" role="dialog" aria-labelledby="modal-title">
      <header class="modal-head">
        <h2 id="modal-title" data-i18n="customers.newCustomer">Nuovo cliente</h2>
        <button class="modal-close" id="btn-modal-close" type="button" aria-label="Chiudi">×</button>
      </header>
      <form id="form-customer" class="form-grid">
        <input type="hidden" id="field-id" />
        <label><span data-i18n="customers.firstName">Nome</span><input id="field-name" required /></label>
        <label><span data-i18n="customers.lastName">Cognome</span><input id="field-surname" /></label>
        <label><span data-i18n="customers.phone">Telefono</span><input type="tel" id="field-phone" /></label>
        <label><span data-i18n="customers.email">Email</span><input type="email" id="field-email" /></label>
        <label>
          <span data-i18n="customers.type">Tipo</span>
          <select id="field-category">
            <option value="nuovo" data-i18n="customers.type_nuovo">Nuovo</option>
            <option value="walkin" data-i18n="customers.type_walkin">Walk-in</option>
            <option value="habitue" data-i18n="customers.type_habitue">Habitué</option>
            <option value="vip">VIP</option>
          </select>
        </label>
        <label><span data-i18n="customers.visits">Visite</span><input type="number" id="field-visits" min="0" value="0" /></label>
        <label><span data-i18n="customers.totalSpent">Spesa totale €</span><input type="number" step="0.01" id="field-spent" min="0" value="0" /></label>
        <label><span data-i18n="customers.lastVisit">Ultima visita</span><input type="date" id="field-lastvisit" /></label>
        <label class="full"><span data-i18n="customers.allergies">Allergie</span><input id="field-allergies" data-i18n-placeholder="customers.allergies_ph" placeholder="Es. glutine, lattosio" /></label>
        <label class="full"><span data-i18n="customers.intolerances">Intolleranze</span><input id="field-intolerances" /></label>
        <label class="full"><span data-i18n="customers.preferences">Preferenze</span><input id="field-preferences" /></label>
        <label class="full"><span data-i18n="customers.notes">Note</span><textarea id="field-notes" rows="2"></textarea></label>
        <div class="form-actions full">
          <button class="btn ghost" type="button" id="btn-form-cancel" data-i18n="cancel">Annulla</button>
          <button class="btn primary" type="submit" data-i18n="save">Salva</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal AI -->
  <div class="modal-backdrop" id="modal-ai" hidden>
    <div class="modal modal-wide" role="dialog" aria-labelledby="ai-modal-title">
      <header class="modal-head">
        <h2 id="ai-modal-title" data-i18n="customers.ai_insights">✨ AI Insights</h2>
        <button class="modal-close" id="btn-ai-close" type="button" aria-label="Chiudi">×</button>
      </header>
      <div class="ai-body">
        <p class="ai-loading" id="ai-loading" data-i18n="customers.ai_loading">Analisi CRM in corso...</p>
        <div id="ai-content" style="display:none">
          <div class="ai-kpi-mini" id="ai-kpi-mini"></div>
          <div class="ai-insights-text" id="ai-insights-text"></div>
          <div class="ai-quick">
            <button class="btn ghost ai-q" type="button" data-q="customers.ai_q_vip" data-i18n="customers.ai_q_vip">VIP a rischio</button>
            <button class="btn ghost ai-q" type="button" data-q="customers.ai_q_allergies" data-i18n="customers.ai_q_allergies">Allergie in sala</button>
            <button class="btn ghost ai-q" type="button" data-q="customers.ai_q_top" data-i18n="customers.ai_q_top">Top clienti</button>
          </div>
          <div class="ai-chat-log" id="ai-chat-log"></div>
          <form id="ai-chat-form" class="ai-chat-form">
            <input id="ai-chat-input" data-i18n-placeholder="customers.ai_ask" placeholder="Chiedi all'AI sul CRM..." />
            <button class="btn primary" type="submit" data-i18n="risto_send">Invia</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/shared/sidebar-mobile.js"></script>
  <script src="/shared/rw-shell.js"></script>
  <script src="/shared/auth-guard.js" data-allowed-roles="owner,supervisor,sala,cassa"></script>
  <script src="/shared/sidebar-nav.js"></script>
  <script src="customers.js?v=20260622"></script>
</body>
</html>
